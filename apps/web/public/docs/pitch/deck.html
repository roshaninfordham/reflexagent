<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reflex — Pitch Deck</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --navy: #0A1628; --ink: #06101F; --teal: #14B8A6; --glow: #5EEAD4;
    --ice: #E0F2FE; --slate: #94A3B8; --slate-dark: #475569;
    --ok: #10B981; --warn: #F59E0B; --alert: #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--ink); color: var(--ice); font-family: 'Inter', system-ui, sans-serif; height: 100%; overflow: hidden; }
  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  .slide {
    width: min(1280px, 96vw); aspect-ratio: 16/9; max-height: 92vh;
    background: radial-gradient(circle at 50% 0%, rgba(20,184,166,0.06), transparent 50%), linear-gradient(180deg, var(--ink) 0%, var(--navy) 100%);
    border: 1px solid rgba(94,234,212,0.15);
    border-radius: 18px;
    padding: 72px 80px;
    position: relative;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }
  .slide.active { display: flex; }
  .slide::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(94,234,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,234,212,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  h1 { color: var(--glow); font-size: clamp(36px, 5.5vw, 72px); font-weight: 800; letter-spacing: -0.025em; line-height: 1.02; text-shadow: 0 0 30px rgba(94,234,212,0.35); }
  h2 { color: var(--glow); font-size: clamp(28px, 3.5vw, 44px); font-weight: 700; letter-spacing: -0.015em; margin-bottom: 14px; }
  h3 { color: var(--ice); font-size: clamp(20px, 2.4vw, 30px); font-weight: 600; margin-top: 6px; }
  p, li, td { font-size: clamp(15px, 1.7vw, 22px); line-height: 1.5; }
  .lead p { font-size: clamp(20px, 2.2vw, 28px); color: var(--ice); }
  strong { color: var(--glow); }
  blockquote {
    border-left: 4px solid var(--glow); padding-left: 22px; color: var(--slate);
    font-style: italic; margin: 18px 0; font-size: clamp(16px, 1.9vw, 24px);
  }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: clamp(13px, 1.5vw, 20px); }
  th, td { border-bottom: 1px solid rgba(94,234,212,0.15); padding: 12px 14px; text-align: left; vertical-align: top; }
  th { color: var(--glow); text-transform: uppercase; font-size: clamp(11px, 1.05vw, 14px); letter-spacing: 0.08em; }
  td:first-child { font-weight: 600; color: var(--ice); }
  .tag {
    display: inline-block; padding: 6px 14px; border-radius: 999px;
    background: rgba(20,184,166,0.12); color: var(--glow); font-size: clamp(11px, 1.1vw, 14px);
    border: 1px solid rgba(94,234,212,0.3); margin: 4px 3px;
  }
  ul, ol { margin: 14px 0 0 28px; }
  li { margin-bottom: 8px; }
  pre {
    background: rgba(6,16,31,0.8); border: 1px solid rgba(94,234,212,0.15);
    border-radius: 12px; padding: 18px 24px; margin-top: 14px;
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: clamp(11px, 1.15vw, 16px); color: var(--ice); overflow: auto;
  }
  .footer {
    position: absolute; bottom: 24px; left: 80px; right: 80px;
    color: var(--slate-dark); font-size: clamp(11px, 1vw, 14px);
    display: flex; justify-content: space-between; align-items: center;
  }
  .pagenum {
    position: absolute; bottom: 24px; right: 28px;
    color: var(--slate-dark); font-size: 12px; font-family: ui-monospace, monospace;
  }
  .nav {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center;
    background: rgba(6,16,31,0.85); border: 1px solid rgba(94,234,212,0.2);
    padding: 8px 14px; border-radius: 999px; backdrop-filter: blur(8px);
    z-index: 1000;
  }
  .nav button {
    background: transparent; color: var(--ice); border: 0; cursor: pointer;
    padding: 4px 10px; font-size: 13px; font-family: inherit;
  }
  .nav button:hover { color: var(--glow); }
  .nav .count { color: var(--slate); font-size: 12px; font-family: ui-monospace, monospace; }

  .center { text-align: center; }
  .mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 14px;
    background: linear-gradient(135deg, var(--teal), #0D9488);
    margin-bottom: 24px; box-shadow: 0 0 30px rgba(20,184,166,0.4);
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat { background: rgba(20,184,166,0.06); border: 1px solid rgba(94,234,212,0.2); border-radius: 12px; padding: 18px; }
  .stat .v { color: var(--glow); font-size: clamp(28px, 3.5vw, 44px); font-weight: 800; }
  .stat .l { color: var(--slate); text-transform: uppercase; font-size: 12px; letter-spacing: 0.1em; margin-top: 4px; }
  .scroll { overflow: auto; flex: 1; min-height: 0; padding-right: 8px; }
  .ring { color: var(--slate); }
  .arrow { color: var(--glow); }
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<div class="nav">
  <button onclick="prev()">‹ prev</button>
  <span class="count" id="count">1 / 10</span>
  <button onclick="next()">next ›</button>
  <button onclick="document.documentElement.requestFullscreen?.()">⛶</button>
</div>

<script>
const slides = [
  // 1 — Title
  `<section class="slide active center lead" style="justify-content:center;align-items:center;">
    <div class="mark">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
        <path d="M3 12 L8 12 L10 7 L14 17 L16 12 L21 12" stroke="#06101F" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" />
      </svg>
    </div>
    <h1>Reflex</h1>
    <h3 style="margin-top:14px;">FDA's missing nervous system.</h3>
    <p style="margin-top:36px;max-width:820px;">
      An autonomous agent swarm that turns drug-safety signals into verified, cited, routed operational deliverables — in seconds, not weeks.
    </p>
    <div style="margin-top:36px;">
      <span class="tag">NimbleWay</span><span class="tag">Senso</span><span class="tag">ClickHouse</span><span class="tag">NVIDIA NIM</span><span class="tag">NVIDIA BioNeMo</span><span class="tag">Datadog LLM Obs</span><span class="tag">x402 · CDP</span>
    </div>
    <div class="footer"><span>github.com/roshaninfordham/reflexagent</span><span>Agentic Engineering Hack · May 2026</span></div>
  </section>`,
  // 2 — Problem
  `<section class="slide">
    <h2>Drug recalls still run on <strong>faxes.</strong></h2>
    <div class="grid3" style="margin-top:36px;">
      <div class="stat"><div class="v">44–98 k</div><div class="l">Americans dying yearly from preventable med errors</div></div>
      <div class="stat"><div class="v">456</div><div class="l">non-compounded recalls / pharmacy / year</div></div>
      <div class="stat"><div class="v">22 M+</div><div class="l">FAERS adverse-event reports 2012–2024</div></div>
    </div>
    <p style="margin-top:38px;color:var(--slate);">
      From FDA recall issued → patient notified: <strong>days to weeks.</strong> Patients keep taking the drug during the gap.
    </p>
    <blockquote style="margin-top:18px;">
      Source: IOM, StatPearls 2024, FDA FAERS, TraceLink 2024.
    </blockquote>
    <div class="pagenum">02</div>
  </section>`,
  // 3 — MGB failure
  `<section class="slide">
    <h2>Mass General Brigham tried this in 2024. <strong>They quit.</strong></h2>
    <blockquote style="margin-top:38px;font-size:clamp(20px,2.4vw,30px);">
      "Unnecessary and unacceptable patient anxiety generated by false-positive notifications."
    </blockquote>
    <p style="color:var(--slate);font-style:italic;margin-top:10px;">— Mass General Brigham, medRxiv 2024.09.18</p>
    <h3 style="margin-top:48px;color:var(--glow);">Verification — not detection — is the unsolved problem.</h3>
    <p style="margin-top:14px;">Anyone can ingest an FDA RSS feed. Nobody trusts the output enough to act on it.</p>
    <div class="pagenum">03</div>
  </section>`,
  // 4 — What Reflex is
  `<section class="slide">
    <h2>What Reflex is</h2>
    <pre style="margin-top:24px;">Autonomous monitor (OpenFDA, every 60s)
       │
       ▼  novel signal — fires the swarm <span class="arrow">without a human click</span>
┌──────────────┬──────────────────────────────┬──────────────┐
│  INGEST      │  DECISION                    │  SYNTHESIS   │
├──────────────┼──────────────────────────────┼──────────────┤
│  Inbound     │  Triage                      │  Writer      │
│  Scout       │  Verify + Counter (advers.)  │  Auditor     │
│  Recon       │  Cohort                      │  Publisher   │
│              │  Substitute (BioNeMo ESM2)   │              │
│              │  Routing + Comms             │              │
└──────────────┴──────────────────────────────┴──────────────┘
       │
       ▼
Cited safety brief on the open web · agent-discoverable · audit-logged</pre>
    <div class="pagenum">04</div>
  </section>`,
  // 5 — Counter-evidence
  `<section class="slide">
    <h2>The trick: the counter-evidence agent</h2>
    <ol style="margin-top:30px;max-width:880px;">
      <li><strong>Confirmation</strong> — claims supported by ≥2 independent sources (FDA / EMA / PubMed).</li>
      <li><strong>Adversarial</strong> — actively hunts manufacturer rebuttals, sponsored studies, regulator clarifications.</li>
    </ol>
    <p style="margin-top:22px;">If a meaningful contradiction surfaces, the workflow's verdict becomes <strong>requires_human</strong> — never silently broadcast.</p>
    <blockquote style="margin-top:36px;">
      Live: the Apotex investor-relations statement contradicting the FDA's NDMA finding on metformin → flagged in red on the canvas → held for review.
    </blockquote>
    <div class="pagenum">05</div>
  </section>`,
  // 6 — Demo (what you're seeing)
  `<section class="slide">
    <h2>Live demo · what you're seeing</h2>
    <table style="margin-top:28px;">
      <thead><tr><th style="width:30%">Surface</th><th>What's running</th></tr></thead>
      <tbody>
        <tr><td>Autonomous monitor</td><td>Real OpenFDA poll, unprompted swarm fire</td></tr>
        <tr><td>Canvas Agent Theater</td><td>11 agent nodes + 6 source nodes; cursors traverse each tool call</td></tr>
        <tr><td>Right rail</td><td>Live Triage / Cohort / Verify+Counter / Substitutes / Published</td></tr>
        <tr><td>Voice Agent</td><td>Browser mic → NIM Llama 3.3 70B with 9 real tools → spoken reply</td></tr>
        <tr><td>Activity Feed</td><td>Every memo, alert, letter, publish, payment streamed in real time</td></tr>
      </tbody>
    </table>
    <div class="pagenum">06</div>
  </section>`,
  // 7 — BioNeMo
  `<section class="slide">
    <h2>NVIDIA BioNeMo · drug substitution</h2>
    <p>When a drug is recalled, <strong>Substitute</strong> ranks alternatives by molecular target similarity.</p>
    <pre style="margin-top:14px;">Recalled: Metformin → target PRKAA1 (AMPK α1)
       │
NIM Llama 3.3 70B picks 3 therapeutic candidates
       │
ESM2-650M embeds each target protein → 1280-d vectors
       │
Cosine similarity ranking
       │
1. Sitagliptin (DPP4)    sim <span style="color:var(--glow)">0.933</span>  ← top
2. Glipizide   (KCNJ11)  sim <span style="color:var(--glow)">0.895</span>
3. Pioglitazone (PPARG)  sim 0.000  ← off-target, ranked last</pre>
    <p style="margin-top:12px;color:var(--slate);">Brief renders the 2D chemical structure + 3D protein cartoon for each candidate.</p>
    <div class="pagenum">07</div>
  </section>`,
  // 8 — Sponsor stack
  `<section class="slide">
    <h2>Sponsor stack · seven, every one doing real work</h2>
    <div class="scroll">
    <table style="margin-top:18px;">
      <thead><tr><th style="width:24%">Sponsor</th><th>Role</th><th>Visible in demo</th></tr></thead>
      <tbody>
        <tr><td>NimbleWay</td><td>Scout + Counter web search across FDA/EMA/PubMed</td><td>Cursor flies to source nodes</td></tr>
        <tr><td>Senso</td><td>apiv2.senso.ai draft + publish to cited.md</td><td>Real draft in dashboard + git URL</td></tr>
        <tr><td>ClickHouse</td><td>Cohort SQL, history, agent traces, outbox audit</td><td>18 patients matched; every action logged</td></tr>
        <tr><td>NVIDIA NIM</td><td>Llama 3.3 70B reasoning · Llama 3.2 90B vision</td><td>Real triage + counter-evidence + sub-briefs</td></tr>
        <tr><td>NVIDIA BioNeMo</td><td>ESM2-650M protein embeddings</td><td>1280-d cosine rank of alternatives</td></tr>
        <tr><td>Datadog LLM Obs</td><td>ddtrace-run auto-instruments every NIM call</td><td>Span tree at app.datadoghq.com</td></tr>
        <tr><td>x402 + Coinbase CDP</td><td>Pay-per-query gating; real Base Sepolia settlement</td><td>BaseScan receipt after payment</td></tr>
      </tbody>
    </table>
    </div>
    <div class="pagenum">08</div>
  </section>`,
  // 9 — Market
  `<section class="slide">
    <h2>Market</h2>
    <div class="grid3" style="margin-top:32px;">
      <div class="stat"><div class="v">$13.7B</div><div class="l">global pharmacovigilance market today</div></div>
      <div class="stat"><div class="v">$34.2B</div><div class="l">by 2032 (16.3% CAGR)</div></div>
      <div class="stat"><div class="v">$80M ARR</div><div class="l">Reflex SOM year 5 (2% SAM)</div></div>
    </div>
    <ul style="margin-top:32px;">
      <li>200 hospital systems × $100k average</li>
      <li>50 pharma compliance teams × $200k</li>
      <li>Long-tail micropayments via x402</li>
    </ul>
    <blockquote style="margin-top:24px;">Source: Research and Markets, April 2026.</blockquote>
    <div class="pagenum">09</div>
  </section>`,
  // 10 — Close
  `<section class="slide center lead" style="justify-content:center;align-items:center;">
    <div class="mark">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
        <path d="M3 12 L8 12 L10 7 L14 17 L16 12 L21 12" stroke="#06101F" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" />
      </svg>
    </div>
    <h1>Reflex.</h1>
    <h3 style="margin-top:12px;">FDA's missing nervous system.</h3>
    <p style="margin-top:48px;font-family:ui-monospace,monospace;font-size:clamp(15px,1.6vw,22px);"><strong>github.com/roshaninfordham/reflexagent</strong></p>
    <p style="margin-top:30px;color:var(--slate);">Thank you.</p>
    <div class="pagenum">10</div>
  </section>`,
];

let idx = 0;
const stage = document.getElementById('stage');
const count = document.getElementById('count');

function render() {
  let html = slides[idx];
  if (!/class="slide [^"]*active/.test(html)) {
    html = html.replace(/class="slide(\s|")/, 'class="slide active$1');
  }
  stage.innerHTML = html;
  count.textContent = `${idx + 1} / ${slides.length}`;
}
function next() { idx = Math.min(slides.length - 1, idx + 1); render(); }
function prev() { idx = Math.max(0, idx - 1); render(); }

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') next();
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') prev();
  else if (e.key === 'Home') { idx = 0; render(); }
  else if (e.key === 'End') { idx = slides.length - 1; render(); }
  else if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
});

render();
</script>
</body>
</html>
